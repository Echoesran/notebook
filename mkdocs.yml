#[Info]
site_name: Echo's Notebook
site_url: https://echoesran.github.io/notebook/
repo_name: Echoesran/notebook 
repo_url: https://github.com/Echoesran/notebook
site_description: Echo's Notebook
copyright: Copyright &copy; 2025 <a href="https://github.com/Echoesran" target="_blank" rel="noopener">Echoesran</a>

#[UI]
theme: 
  name: material
  language: zh
  #custom_dir: overrides
  #icon: 
    #logo: material/notebook-outline
  font: LXGW WenKai
  code: JetBrains Mono #字体设置 https://github.com/lxgw/LxgwWenKai-Screen?tab=readme-ov-file
  palette:
    - primary: black
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-night #图标，参见 https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
        name: 切换至夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate #夜间模式
      toggle:
        icon: material/brightness-sunny
        name: 切换至日间模式
  features:
    - content.code.copy # 代码块复制按键
    - content.code.annotate # 代码块中增添点击展示的注释，参见 https://squidfunk.github.io/mkdocs-material/reference/code-blocks/#adding-annotations
    - navigation.footer # 页面底部有下一页的链接(按目录上的顺序)
    - navigation.tracking # 地址栏中的 URL 会随当前位置变化为对应小节的 URL
    - navigation.tabs #一级导航在横着的导航栏
    - navigation.indexes #将 index 页面直接附到小节名上
    - navigation.top # 回到顶部按钮
    - search.highlight # 搜索出的文章关键词加入高亮
    - search.share #搜索分享按钮
    - search.suggest # 搜索建议
markdown_extensions: #详见https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/ 和 https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/
  - abbr
  - attr_list
  - admonition
  - def_list
  - footnotes
  - md_in_html
  # - meta # 支持Markdown文件上方自定义标题标签等
  - pymdownx.caret
  - pymdownx.betterem
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          #format:
            #!!python/name:pymdownx.superfences.fence_code_format # 代码块高亮插件
  - pymdownx.arithmatex: # latex支持
      generic: true
  - toc:
      permalink: true # 固定标题位置为当前位置
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      # auto_title: true # 显示编程语言名称
  #- pymdownx.emoji:
      #emoji_index: !!python/name:materialx.emoji.twemoji
      #emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
plugins:
  - search
nav:
  - Home:
    - index.md